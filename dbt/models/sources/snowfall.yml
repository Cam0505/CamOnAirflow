version: 2

sources:

  - name: snowfall
    database: camonairflow
    schema: skifields
    
    tables:
      - name: ski_field_snowfall
        description: Raw daily Open-Meteo snowfall and supporting meteorology used by the dbt snowpack model.


  - name: weather_jp
    database: camonairflow
    schema: weather_jp

    tables:
      - name: jp_ski_field_weather
        description: Raw daily JMA observations matched to Japanese ski resorts. Ski-season filtering and elevation-adjusted snowfall estimation are handled downstream in dbt.
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns:
                  - date
                  - location
        config:
          freshness:
            warn_after: {count: 10, period: day}
            error_after: {count: 20, period: day}
        loaded_at_field: CAST(date AS TIMESTAMP)
version: 2

models:
  - name: base_ski_field_snowfall_modeled
    description: Snowpack-adjusted daily snowfall model built from the raw Open-Meteo snowfall inputs.
    columns:
      - name: ski_field
        description: Ski field name.
      - name: country
        description: Country code.
      - name: region_profile
        description: Calibrated regional model profile.
      - name: datecol
        description: Observation date.
      - name: daily_snowfall_cm
        description: Final snowpack-adjusted modeled daily snowfall in centimeters.
      - name: om_direct_snowfall_cm
        description: Direct Open-Meteo snowfall total in centimeters.
      - name: precip_temp_snowfall_cm
        description: Precipitation plus temperature snowfall estimate in centimeters.
      - name: depth_precip_blend_cm
        description: Depth-precip blended snowfall estimate in centimeters.

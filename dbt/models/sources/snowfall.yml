version: 2

sources:

  - name: snowfall
    database: camonairflow
    schema: skifields
    
    tables:
      - name: ski_field_snowfall
        description: Raw daily Open-Meteo snowfall and supporting meteorology used by the dbt snowpack model.

        config:
          freshness:
            warn_after: {count: 10, period: day}
            error_after: {count: 20, period: day}
        loaded_at_field: CAST(date AS TIMESTAMP)